<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClearPath — Nursing CE Intelligence</title>
    <meta name="description" content="AI-powered continuing education recommendations for nursing directors, powered by IBM watsonx.ai" />
  </head>
  <body>
    <div id="root"></div>
    <div id="wxo-chat" style="position:fixed;right:0;top:60px;bottom:0;width:380px;z-index:90;background:#0f1829;border-left:1px solid rgba(30,64,120,0.4);display:flex;flex-direction:column;"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (async function() {
        var chatEl = document.getElementById('wxo-chat');
        var API_BASE = 'https://clearpath-production-2705.up.railway.app';
        var WXO_HOST = 'https://us-south.watson-orchestrate.cloud.ibm.com';

        // Fetch JWT from backend
        var token = null;
        try {
          var res = await fetch(API_BASE + '/chat-token');
          var data = await res.json();
          token = data.token;
        } catch (e) {
          console.warn('[ClearPath] Could not fetch chat token:', e);
        }

        window.wxOConfiguration = {
          orchestrationID: '6338cb457acd4b17836772163f7a48b8_33e4b7b0-ca4c-416f-b9ef-3cc939b8c196',
          hostURL: WXO_HOST,
          deploymentPlatform: 'ibmcloud',
          showLauncher: false,
          token: token,
          chatOptions: {
            agentId: '79146015-61b5-4c14-b6cd-b414eb1a6d18',
          },
          layout: {
            form: 'custom',
            customElement: chatEl,
            showOrchestrateHeader: true,
          },
        };

        var s = document.createElement('script');
        s.src = WXO_HOST + '/wxochat/wxoLoader.js?embed=true';
        s.addEventListener('load', function() {
          wxoLoader.init();
        });
        document.head.appendChild(s);
      })();
    </script>
  </body>
</html>
